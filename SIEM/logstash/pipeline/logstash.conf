input {
  beats {
    port => 5044
  }
}

filter {
  grok {
    match => {
      "message" => '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:log_timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:bytes} "%{DATA:referrer}" "%{DATA:user_agent}"'
    }
  }

  date {
    match => [ "log_timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    target => "@timestamp"
  }

  mutate {
    convert => {
      "status" => "integer"
      "bytes" => "integer"
    }
  }

  mutate {
    add_field => {
      "attack_type" => "Acceso web"
      "severity" => "baja"
      "category" => "web"
    }
  }

  if [status] == 401 {
    mutate {
      update => {
        "attack_type" => "Acceso no autorizado"
        "severity" => "media"
        "category" => "auth"
      }
    }
  }

  if [request] =~ /(?i)(admin|login|phpmyadmin|\.env|config|backup|test)/ {
    mutate {
      update => {
        "attack_type" => "Reconocimiento web"
        "severity" => "media"
        "category" => "recon"
      }
    }
  }

  if [request] =~ /(?i)(\.\.\/|\.\.%2f|%2e%2e%2f|etc\/passwd|boot\.ini)/ {
    mutate {
      update => {
        "attack_type" => "Directory traversal"
        "severity" => "alta"
        "category" => "traversal"
      }
    }
  }

  if [request] =~ /(?i)(union.*select|select.*from|or.*1=1|drop.*table|insert.*into|update.*set)/ {
    mutate {
      update => {
        "attack_type" => "SQL injection"
        "severity" => "alta"
        "category" => "sqli"
      }
    }
  }

  if [request] =~ /(?i)(cmd=|exec=|system\(|bash|powershell|wget|curl.*http)/ {
    mutate {
      update => {
        "attack_type" => "Intento de ejecución remota"
        "severity" => "alta"
        "category" => "rce"
      }
    }
  }

  if [request] =~ /(?i)(wp-admin|wp-login|xmlrpc\.php|joomla|drupal)/ {
    mutate {
      update => {
        "attack_type" => "Reconocimiento CMS"
        "severity" => "media"
        "category" => "recon"
      }
    }
  }

  if [user_agent] =~ /(?i)(nmap|nikto|sqlmap|dirb|gobuster|wpscan|masscan)/ {
    mutate {
      update => {
        "attack_type" => "Escaneo de puertos"
        "severity" => "alta"
        "category" => "scanner"
      }
    }
  }

  mutate {
    remove_field => [
      "@version",
      "agent",
      "ecs",
      "host",
      "input",
      "log",
      "tags",
      "referrer",
      "remote_user",
      "http_version",
      "log_timestamp",
      "message"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "siem-nginx-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}